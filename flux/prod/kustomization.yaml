apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: planmyjourney-gitops
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/Plan-My-Journey/PlanMyJourney-Gitops
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod
  namespace: flux-system
spec:
  interval: 5m
  path: ./kustomize/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: planmyjourney-gitops
  targetNamespace: prod
  timeout: 10m
  retryInterval: 2m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dev
  namespace: flux-system
spec:
  interval: 5m
  path: ./kustomize/overlays/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: planmyjourney-gitops
  targetNamespace: dev
  timeout: 10m
  retryInterval: 2m
