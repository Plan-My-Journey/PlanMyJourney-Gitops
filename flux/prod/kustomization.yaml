apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: planmyjourney-gitops
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/Plan-My-Journey/PlanMyJourney-Gitops
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: production
  namespace: flux-system
spec:
  interval: 5m
  path: ./kustomize/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: planmyjourney-gitops
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: user-service
      namespace: production
    - apiVersion: apps/v1
      kind: Deployment
      name: ai-service
      namespace: production
    - apiVersion: apps/v1
      kind: Deployment
      name: travel-service
      namespace: production
    - apiVersion: apps/v1
      kind: Deployment
      name: utility-service
      namespace: production
  timeout: 10m
  retryInterval: 2m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway
  namespace: flux-system
spec:
  interval: 5m
  path: ./gateway
  prune: true
  sourceRef:
    kind: GitRepository
    name: planmyjourney-gitops
  timeout: 5m
