apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: planmyjourney
  namespace: argocd
spec:
  description: Plan My Journey dev and prod environments
  sourceRepos:
    - https://github.com/Plan-My-Journey/PlanMyJourney-Gitops
    # OCI Helm registries are referenced without the oci:// scheme (ArgoCD adds it)
    - cr.kgateway.dev/kgateway-dev/charts
    - public.ecr.aws/karpenter
    - https://kedacore.github.io/charts
    - https://kubernetes-sigs.github.io/metrics-server/
    - https://prometheus-community.github.io/helm-charts
    - https://charts.jetstack.io
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: prod
      server: https://kubernetes.default.svc
    - namespace: dev
      server: https://kubernetes.default.svc
    - namespace: kgateway-system
      server: https://kubernetes.default.svc
    - namespace: karpenter
      server: https://kubernetes.default.svc
    - namespace: keda
      server: https://kubernetes.default.svc
    # KEDA's metrics adapter creates an auth-reader RoleBinding in kube-system
    - namespace: kube-system
      server: https://kubernetes.default.svc
    # Karpenter manages node leases in kube-node-lease
    - namespace: kube-node-lease
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
