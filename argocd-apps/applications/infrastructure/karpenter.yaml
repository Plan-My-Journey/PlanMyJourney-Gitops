apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-karpenter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: planmyjourney
  sources:
    - repoURL: public.ecr.aws/karpenter
      chart: karpenter
      targetRevision: 1.0.8
      helm:
        releaseName: karpenter
        values: |
          replicas: 1
          settings:
            clusterName: ai-travel-prod
            interruptionQueue: ai-travel-prod-karpenter-interruption
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: arn:aws:iam::235270183260:role/ai-travel-prod-karpenter-controller
          controller:
            resources:
              requests:
                cpu: 200m
                memory: 256Mi
              limits:
                cpu: "1"
                memory: 512Mi
    - repoURL: https://github.com/Plan-My-Journey/PlanMyJourney-Gitops
      targetRevision: main
      path: platform/karpenter
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
