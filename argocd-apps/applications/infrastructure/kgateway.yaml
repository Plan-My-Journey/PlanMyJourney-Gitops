apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-kgateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: planmyjourney
  source:
    repoURL: oci://cr.kgateway.dev/kgateway-dev/charts/kgateway
    chart: kgateway
    targetRevision: v2.3.4
    helm:
      releaseName: kgateway
      values: |
        controller:
          image:
            pullPolicy: IfNotPresent
  destination:
    server: https://kubernetes.default.svc
    namespace: kgateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
