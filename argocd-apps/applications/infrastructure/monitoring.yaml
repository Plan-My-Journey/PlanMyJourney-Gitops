apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: planmyjourney
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 87.2.1
      helm:
        releaseName: monitoring
        values: |
          # Control-plane components are not scrapable on EKS managed control plane
          kubeControllerManager:
            enabled: false
          kubeScheduler:
            enabled: false
          kubeEtcd:
            enabled: false
          kubeProxy:
            enabled: false
          alertmanager:
            alertmanagerSpec:
              resources:
                requests: { cpu: 25m, memory: 64Mi }
                limits: { memory: 128Mi }
          prometheus:
            prometheusSpec:
              retention: 7d
              # scrape ServiceMonitors from all namespaces (incl. the app charts)
              serviceMonitorSelectorNilUsesHelmValues: false
              podMonitorSelectorNilUsesHelmValues: false
              ruleSelectorNilUsesHelmValues: false
              resources:
                requests: { cpu: 200m, memory: 1Gi }
                limits: { memory: 2Gi }
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: gp2
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 20Gi
          prometheus-node-exporter:
            resources:
              requests: { cpu: 20m, memory: 32Mi }
              limits: { memory: 64Mi }
          kube-state-metrics:
            resources:
              requests: { cpu: 20m, memory: 64Mi }
              limits: { memory: 128Mi }
          grafana:
            admin:
              existingSecret: grafana-admin
              userKey: admin-user
              passwordKey: admin-password
            persistence:
              enabled: true
              storageClassName: gp2
              size: 5Gi
            resources:
              requests: { cpu: 100m, memory: 512Mi }
              limits: { cpu: "1", memory: 1Gi }
            grafana.ini:
              server:
                root_url: https://grafana.invest-iq.online
                serve_from_sub_path: false
              # Grafana 12's experimental k8s/unified-storage dashboard apiserver
              # is heavy and was timing out; keep dashboards on classic SQL storage.
              feature_toggles:
                kubernetesDashboards: false
                kubernetesClientDashboardsFolders: false
    - repoURL: https://github.com/Plan-My-Journey/PlanMyJourney-Gitops
      targetRevision: main
      path: monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
