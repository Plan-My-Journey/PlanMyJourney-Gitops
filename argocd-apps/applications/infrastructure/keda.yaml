apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-keda
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: planmyjourney
  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda
    targetRevision: 2.16.1
    helm:
      releaseName: keda
      values: |
        crds:
          install: true
        podIdentity:
          aws:
            irsa:
              enabled: true
        # IRSA so the KEDA operator can read SQS queue depth (aws-sqs-queue scaler)
        serviceAccount:
          operator:
            annotations:
              eks.amazonaws.com/role-arn: arn:aws:iam::235270183260:role/ai-travel-keda-operator-prod
        resources:
          operator:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
