apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: travel-service
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: planmyjourney
  source:
    repoURL: https://github.com/Plan-My-Journey/PlanMyJourney-Gitops
    targetRevision: main
    path: helm-charts/travel-service
    helm:
      releaseName: travel-service
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
