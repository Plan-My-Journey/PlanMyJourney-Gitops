apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-gateway-routes
  namespace: argocd
  labels:
    environment: dev
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: planmyjourney
  source:
    repoURL: https://github.com/Plan-My-Journey/PlanMyJourney-Gitops
    targetRevision: main
    path: gateway/routes/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
