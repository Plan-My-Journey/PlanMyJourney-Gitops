apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-gateway-routes
  namespace: argocd
  labels:
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: planmyjourney
  source:
    repoURL: https://github.com/Plan-My-Journey/PlanMyJourney-Gitops
    targetRevision: main
    path: gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
