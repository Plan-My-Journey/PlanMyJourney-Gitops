name: ArgoCD Sync After GitOps Merge

# Runs only after a human merges a deploy PR to main.
# Production ArgoCD sync must not run before GitOps merge.

on:
  push:
    branches: [main]
    paths:
      - "helm-charts/**/values-prod.yaml"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed production charts
        id: charts
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit to diff against."
            echo "apps=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mapfile -t charts < <(git diff --name-only "$BEFORE" "$AFTER" \
            | grep '^helm-charts/.*/values-prod.yaml$' \
            | sed -E 's|^helm-charts/([^/]+)/values-prod.yaml|\1|' \
            | sort -u)
          if [ "${#charts[@]}" -eq 0 ]; then
            echo "No production chart changes detected."
            echo "apps=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          apps=()
          for chart in "${charts[@]}"; do
            case "$chart" in
              ai-service)
                apps+=("prod-ai-service" "prod-ai-worker")
                ;;
              ai-worker)
                apps+=("prod-ai-worker")
                ;;
              frontend)
                echo "Skipping prod-frontend — production frontend uses S3 + CloudFront."
                ;;
              *)
                apps+=("prod-${chart}")
                ;;
            esac
          done
          uniq_apps="$(printf '%s\n' "${apps[@]}" | sort -u | tr '\n' ' ' | xargs)"
          echo "apps=${uniq_apps}" >> "$GITHUB_OUTPUT"
          echo "ArgoCD apps to sync: ${uniq_apps}"

      - name: Install ArgoCD CLI
        if: steps.charts.outputs.apps != ''
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

      - name: Sync production ArgoCD applications
        if: steps.charts.outputs.apps != ''
        env:
          ARGOCD_SERVER: ${{ vars.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          APPS: ${{ steps.charts.outputs.apps }}
        run: |
          set -euo pipefail
          argocd login "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --insecure
          for app in $APPS; do
            echo "Syncing ${app} ..."
            argocd app sync "$app" --async || argocd app sync "$app"
            argocd app wait "$app" --health --timeout 600
          done
          echo "Production ArgoCD sync completed."
