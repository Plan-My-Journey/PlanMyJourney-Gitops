apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: api-gateway
  namespace: gateway-system
  labels:
    app.kubernetes.io/part-of: planmyjourney
    app.kubernetes.io/managed-by: argocd
spec:
  gatewayClassName: eg
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: nlb-config
      namespace: gateway-system
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: api-gateway-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All
