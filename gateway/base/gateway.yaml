apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: api-gateway
  namespace: kgateway-system
  labels:
    app.kubernetes.io/part-of: planmyjourney
    app.kubernetes.io/managed-by: argocd
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      group: gateway.kgateway.dev
      kind: GatewayParameters
      name: nlb-config
  listeners:
    # Single HTTP listener on :443. The NLB terminates TLS on :443 (ACM cert via
    # GatewayParameters ssl-cert/ssl-ports) and forwards plain HTTP to the proxy.
    # Routes attach via sectionName: http. All public traffic uses HTTPS.
    - name: http
      port: 443
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
