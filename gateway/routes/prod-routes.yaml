# Production HTTPRoutes — routed via Envoy Gateway (KGateway provider) + AWS NLB
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prod-frontend-route
  namespace: prod
spec:
  parentRefs:
    - name: api-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - invest-iq.online
    - www.invest-iq.online
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prod-user-service-route
  namespace: prod
spec:
  parentRefs:
    - name: api-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - api.invest-iq.online
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      backendRefs:
        - name: user-service
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: user-service
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
