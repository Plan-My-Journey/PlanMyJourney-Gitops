# Development HTTPRoutes — KGateway + AWS NLB (ACM TLS at NLB)
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dev-user-service-route
  namespace: dev
spec:
  parentRefs:
    - name: api-gateway
      namespace: kgateway-system
      sectionName: http
  hostnames:
    - dev-api.invest-iq.online
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      backendRefs:
        - name: user-service
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: user-service
          port: 8000
