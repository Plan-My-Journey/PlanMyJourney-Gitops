# Development HTTPRoutes — routed via Envoy Gateway (KGateway provider) + AWS NLB
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dev-frontend-route
  namespace: dev
spec:
  parentRefs:
    - name: api-gateway
      namespace: gateway-system
      sectionName: http
    - name: api-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - dev.invest-iq.online
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dev-user-service-route
  namespace: dev
spec:
  parentRefs:
    - name: api-gateway
      namespace: gateway-system
      sectionName: http
    - name: api-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - dev-api.invest-iq.online
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      backendRefs:
        - name: user-service
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: user-service
          port: 8000
