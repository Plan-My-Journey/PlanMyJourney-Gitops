# Production HTTPRoutes.
# During the Envoy->KGateway migration these attach to BOTH gateways (dual parentRefs)
# so the live API keeps serving via Envoy until DNS is cut over to KGateway.
# The /api prefix is stripped to match backend service paths (app nginx.conf contract).
# After cutover + Envoy decommission, the gateway-system parentRefs are removed.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prod-user-service-route
  namespace: prod
spec:
  parentRefs:
    - name: api-gateway
      namespace: kgateway-system
      sectionName: http
  hostnames: ["api.invest-iq.online"]
  rules:
    - matches: [{ path: { type: PathPrefix, value: /api/auth } }]
      filters:
        - type: URLRewrite
          urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: /auth } }
      backendRefs: [{ name: user-service, port: 8000, group: "", kind: Service, weight: 1 }]
    - matches: [{ path: { type: PathPrefix, value: /api/users } }]
      filters:
        - type: URLRewrite
          urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: /users } }
      backendRefs: [{ name: user-service, port: 8000, group: "", kind: Service, weight: 1 }]
