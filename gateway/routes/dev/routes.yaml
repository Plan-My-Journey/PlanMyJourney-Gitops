# Development HTTPRoutes.
# Dual parentRefs (Envoy + KGateway) during migration; /api prefix stripped to match backends.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dev-user-service-route
  namespace: dev
spec:
  parentRefs:
    - name: api-gateway
      namespace: kgateway-system
      sectionName: http
  hostnames: ["dev-api.invest-iq.online"]
  rules:
    - matches: [{ path: { type: PathPrefix, value: /api/auth } }]
      filters:
        - type: URLRewrite
          urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: /auth } }
      backendRefs: [{ name: user-service, port: 8000, group: "", kind: Service, weight: 1 }]
    - matches: [{ path: { type: PathPrefix, value: /api/users } }]
      filters:
        - type: URLRewrite
          urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: /users } }
      backendRefs: [{ name: user-service, port: 8000, group: "", kind: Service, weight: 1 }]
