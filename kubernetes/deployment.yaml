apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-service
  namespace: production
  labels:
    app.kubernetes.io/name: travel-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: travel-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: travel-service
    spec:
      serviceAccountName: travel-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: travel-service
          image: 235270183260.dkr.ecr.us-east-1.amazonaws.com/ai-travel/travel-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: travel-service-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
