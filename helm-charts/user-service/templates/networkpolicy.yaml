apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "user-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "user-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "user-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound to RDS PostgreSQL
    - ports:
        - protocol: TCP
          port: 5432
    # Allow outbound HTTPS (AWS APIs, IRSA token endpoint)
    - ports:
        - protocol: TCP
          port: 443
    # Allow to kube-apiserver
    - ports:
        - protocol: TCP
          port: 6443
