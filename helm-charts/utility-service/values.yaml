replicaCount: 2

image:
  repository: "235270183260.dkr.ecr.us-east-1.amazonaws.com/ai-travel/utility-service"
  pullPolicy: IfNotPresent
  tag: "latest"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: false

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: true
  minAvailable: 1

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

configMap:
  enabled: true
  data:
    LOG_LEVEL: "info"
    ENVIRONMENT: "production"
    CORS_ORIGINS: "https://invest-iq.online,https://www.invest-iq.online,https://api.invest-iq.online"

env:
  - name: OPENWEATHER_API_KEY
    valueFrom:
      secretKeyRef:
        name: utility-service-secrets
        key: openweather_api_key
  - name: GEOAPIFY_API_KEY
    valueFrom:
      secretKeyRef:
        name: utility-service-secrets
        key: geoapify_api_key
  - name: JWT_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: utility-service-secrets
        key: jwt_secret_key

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - utility-service
          topologyKey: kubernetes.io/hostname

terminationGracePeriodSeconds: 30

nodeSelector: {}

tolerations: []

servicemonitor:
  enabled: false
  interval: "30s"
  scrapeTimeout: "10s"
  path: /metrics
